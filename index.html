<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kütüphanem | Kesintisiz Erişim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Merriweather:ital,wght@0,700;1,400&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #D1D5DB; }
        .serif-text { font-family: 'Merriweather', serif; }
        .sidebar-shadow { border-bottom: 4px solid rgba(0,0,0,0.3); }
    </style>
</head>
<body x-data="{ page: 'home', login: false }">

    <nav class="bg-black text-white h-14 flex items-center justify-between px-4 sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <span @click="page = 'home'" class="font-black text-xl tracking-tighter cursor-pointer">E-Kütüphanem</span>
            <div class="relative flex items-center">
                <input type="text" class="rounded-full py-1 px-4 text-black text-sm w-64 outline-none" placeholder="Kitap ara...">
                <button class="absolute right-0 bg-[#7B1FA2] p-1.5 rounded-r-full hover:bg-purple-800 transition-colors">🔍</button>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-1 cursor-pointer font-bold text-xs uppercase">
                <span>🌐 Türkçe</span> <span class="text-gray-500">TR</span>
            </div>
            <button @click="login = !login" class="bg-[#FFC107] text-black text-xs font-black px-4 py-1.5 rounded-sm hover:bg-yellow-500">Oturum Aç</button>
            <div class="flex gap-4 text-xl">
                <span class="text-red-600 cursor-pointer">▶️</span>
                <span class="text-blue-600 cursor-pointer font-bold">f</span>
                <span class="text-red-500 cursor-pointer">📌</span>
                <span class="text-yellow-400 cursor-pointer">👻</span>
            </div>
        </div>
    </nav>

    <div class="flex">
        <aside class="w-60 bg-[#C0C0C0] min-h-screen p-3 flex flex-col gap-1.5 border-r border-gray-400">
            <button @click="page = 'romantic'" class="sidebar-shadow bg-[#E91E63] text-white text-left px-3 py-2.5 text-[11px] font-black rounded-sm flex items-center gap-2"><span>📖</span> Romantik Kitap</button>
            <button @click="page = 'home'" class="sidebar-shadow bg-[#1976D2] text-white text-left px-3 py-2.5 text-[11px] font-black rounded-sm flex items-center gap-2"><span>🎓</span> Akademik Kitap</button>
            <button @click="page = 'home'" class="sidebar-shadow bg-[#00BCD4] text-white text-left px-3 py-2.5 text-[11px] font-black rounded-sm flex items-center gap-2"><span>💡</span> Kişisel Gelişim</button>
            <button @click="page = 'children'" class="sidebar-shadow bg-[#FF9800] text-white text-left px-3 py-2.5 text-[11px] font-black rounded-sm flex items-center gap-2"><span>🧸</span> Çocuk Kitapları</button>
            <button @click="page = 'classic'" class="sidebar-shadow bg-[#F44336] text-white text-left px-3 py-2.5 text-[11px] font-black rounded-sm flex items-center gap-2"><span>📚</span> Edebiyat Kitabı</button>
            <button @click="page = 'psychology'" class="sidebar-shadow bg-[#3F51B5] text-white text-left px-3 py-2.5 text-[11px] font-black rounded-sm flex items-center gap-2"><span>🧠</span> Psikoloji Kitabı</button>
            <button @click="page = 'home'" class="sidebar-shadow bg-black text-white text-left px-3 py-2.5 text-[11px] font-black rounded-sm flex items-center gap-2 mt-4"><span>🏠</span> E-Kütüphanem</button>
        </aside>

        <main class="flex-1 p-12 relative">
            
            <div x-show="login" class="absolute top-10 right-10 bg-[#2D2D2D] text-white p-6 shadow-2xl z-40 border border-gray-600 rounded">
                <p class="text-[10px] text-gray-400 mb-4">Google ile Oturum Aç</p>
                <input type="email" placeholder="E-posta" class="w-full mb-2 p-2 text-black text-xs rounded">
                <input type="password" placeholder="Şifre" class="w-full mb-4 p-2 text-black text-xs rounded">
                <button class="w-full bg-[#1A73E8] py-2 text-xs font-bold rounded">Oturum Aç</button>
                <button class="w-full mt-2 border border-gray-500 py-2 text-xs font-bold rounded">Kayıt Ol</button>
            </div>

            <template x-if="page === 'home'">
                <div class="flex flex-col items-center">
                    <h1 class="text-4xl font-black mb-12 serif-text tracking-tight">En Çok Okunan Kitaplar</h1>
                    <div class="flex items-center gap-12 mb-16">
                        <span class="text-6xl cursor-pointer hover:scale-110">⬅️</span>
                        <div class="flex gap-6">
                            <div @click="page = 'twilight'" class="w-44 h-64 bg-gray-800 shadow-2xl border-4 border-white cursor-pointer hover:rotate-2 transition-transform"></div>
                            <div @click="page = 'psychology'" class="w-44 h-64 bg-gray-700 shadow-2xl border-4 border-white cursor-pointer"></div>
                            <div class="w-44 h-64 bg-gray-900 shadow-2xl border-4 border-white cursor-pointer"></div>
                        </div>
                        <span class="text-6xl cursor-pointer hover:scale-110">➡️</span>
                    </div>
                </div>
            </template>

            <template x-if="page === 'children'">
                <div class="flex flex-col items-center">
                    <h1 class="text-4xl font-black mb-12 serif-text">Children's Books</h1>
                    <div class="flex items-center gap-12">
                        <span class="text-6xl cursor-pointer">⬅️</span>
                        <div class="flex gap-6">
                            <div class="w-40 h-56 bg-orange-200 border-4 border-white shadow-xl"></div>
                            <div class="w-40 h-56 bg-purple-200 border-4 border-white shadow-xl"></div>
                            <div class="w-40 h-56 bg-green-200 border-4 border-white shadow-xl"></div>
                        </div>
                        <span class="text-6xl cursor-pointer">➡️</span>
                    </div>
                    <p class="mt-20 text-center font-bold italic max-w-md">Our e-library is a digital world designed for everyone who loves to read.</p>
                </div>
            </template>

            <template x-if="page === 'psychology'">
                <div class="max-w-5xl mx-auto flex gap-12">
                    <div class="w-80">
                        <div class="h-[400px] bg-indigo-900 border-4 border-white shadow-2xl p-6 flex items-end">
                            <span class="text-white font-black text-2xl">PSYCHOLOGY</span>
                        </div>
                        <div class="flex justify-between mt-6 text-2xl opacity-70">
                            <span>🛒</span><span>🖨️</span><span>📶</span><span>🔗</span>
                        </div>
                        <button class="w-full mt-6 bg-black text-white py-4 text-[10px] font-black uppercase tracking-widest">➕ Add to My E-Library</button>
                    </div>
                    <div class="flex-1">
                        <h1 class="text-7xl font-black serif-text mb-2 tracking-tighter">Psychology</h1>
                        <p class="text-gray-500 font-bold mb-6 italic">By Stephenie Meyer (Contextual)</p>
                        <div class="flex items-center gap-2 mb-8"><span class="text-[#FFC107] text-2xl">★★★★☆</span><span class="font-bold text-sm">4.5/5</span></div>
                        <div class="text-sm text-gray-800 leading-relaxed text-justify italic border-l-4 border-black/10 pl-6">
                            Emma is one of Jane Austen's best-loved novels... The novel provides an insight into the distinctions in the rigid class structure of England.
                        </div>
                    </div>
                </div>
            </template>

            <template x-if="page === 'twilight'">
                <div class="max-w-5xl mx-auto flex gap-12">
                    <div class="w-80">
                        <div class="h-[400px] bg-black border-4 border-white shadow-2xl relative">
                            <img src="https://m.media-amazon.com/images/I/615ZI6mPqlL._AC_UF1000,1000_QL80_.jpg" class="w-full h-full object-cover">
                        </div>
                        <button class="w-full mt-6 bg-black text-white py-4 text-[10px] font-black uppercase">➕ Add to My E-Library</button>
                    </div>
                    <div class="flex-1">
                        <h1 class="text-7xl font-black serif-text mb-2 tracking-tighter">Alacakaranlık</h1>
                        <p class="text-gray-500 font-bold mb-6 italic">By Stephanie Meyer</p>
                        <div class="flex items-center gap-2 mb-8 text-[#FFC107] text-2xl">★★★★★</div>
                        <div class="text-sm text-gray-800 leading-relaxed space-y-4 font-medium italic">
                            <p>"Üç şeyden kesinlikle emindim. Birincisi Edward bir vampirdi. İkincisi, onun ne kadar baskın olduğunu bilmediğim bir yanı kana susamıştı..."</p>
                            <p>Porselen teni, altın gözleri ve büyüleyici sesiyle Edward hem karşı konulmazdı hem de gizemliydi.</p>
                        </div>
                    </div>
                </div>
            </template>

            <div class="mt-20 w-full flex flex-col items-center gap-6">
                <div class="flex gap-4">
                    <div class="w-3 h-3 rounded-full bg-gray-400"></div>
                    <div class="w-3 h-3 rounded-full bg-[#7B1FA2] animate-pulse"></div>
                    <div class="w-3 h-3 rounded-full bg-gray-400"></div>
                </div>
                <div class="border-x-8 border-black px-12 py-3">
                    <p class="font-black italic text-2xl uppercase tracking-tighter leading-none">"Binlerce Kitap Tek Tıkla Yanında"</p>
                    <p class="text-[10px] font-bold text-gray-500 uppercase mt-1 text-center">Roman, kişisel gelişim, akademik ve daha fazlası...</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
